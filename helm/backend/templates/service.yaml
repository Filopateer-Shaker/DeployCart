apiVersion: v1
kind: Service
metadata:
  name: backend-service
  labels:
    app: backend
    app.kubernetes.io/name: deploycart-backend
    monitoring: enabled
spec:
  type: {{ .Values.service.type }}
  selector:
    app: backend
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http
