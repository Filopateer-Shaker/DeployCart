# grafana-ingress.yaml
# Exposes Grafana at /grafana through the existing ingress-nginx controller,
# reusing its single AWS Load Balancer - no new LB, no custom domain.
#
# Works together with the grafana.ini settings in prometheus-values.yaml
# (root_url + serve_from_sub_path: true), so no path-rewrite annotation is
# needed here: Grafana itself understands it's being served under /grafana.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-grafana
                port:
                  number: 80
