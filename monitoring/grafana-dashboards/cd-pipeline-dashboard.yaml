apiVersion: v1
kind: ConfigMap
metadata:
  name: cd-pipeline-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  cd-pipeline-dashboard.json: |
    {
      "title": "CD Pipeline (Argo CD)",
      "uid": "cd-pipeline-argocd",
      "schemaVersion": 39,
      "version": 1,
      "timezone": "browser",
      "time": { "from": "now-24h", "to": "now" },
      "refresh": "1m",
      "tags": ["argocd", "cd", "gitops", "worker4"],
      "description": "Tracks the CD half of the pipeline (GitHub Actions builds/pushes an image, updates the gitops repo, Argo CD syncs it to EKS). GitHub Actions itself runs on GitHub's own SaaS runners so there's nothing to scrape there directly - build/job status is visible on the repo's Actions tab and can be checked via the GitHub API or a status badge. This dashboard covers the part that lives in-cluster: whether Argo CD actually deployed what was pushed.",
      "panels": [
        {
          "id": 1,
          "title": "Apps Synced",
          "type": "stat",
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 0 },
          "targets": [{ "expr": "count(argocd_app_info{sync_status=\"Synced\"})" }]
        },
        {
          "id": 2,
          "title": "Apps Out Of Sync",
          "type": "stat",
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 0 },
          "targets": [{ "expr": "count(argocd_app_info{sync_status=\"OutOfSync\"})" }],
          "fieldConfig": { "defaults": { "thresholds": { "steps": [ { "value": 0, "color": "green" }, { "value": 1, "color": "red" } ] } } }
        },
        {
          "id": 3,
          "title": "Apps Healthy vs Degraded",
          "type": "stat",
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 0 },
          "targets": [
            { "expr": "count(argocd_app_info{health_status=\"Healthy\"})", "legendFormat": "healthy" },
            { "expr": "count(argocd_app_info{health_status=\"Degraded\"})", "legendFormat": "degraded" }
          ]
        },
        {
          "id": 4,
          "title": "Sync Status per App",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "targets": [
            {
              "expr": "argocd_app_info",
              "legendFormat": "{{name}} - {{sync_status}}"
            }
          ]
        },
        {
          "id": 5,
          "title": "Sync Operations (rate, 15m)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "targets": [
            {
              "expr": "sum(rate(argocd_app_sync_total[15m])) by (name, phase)",
              "legendFormat": "{{name}} - {{phase}}"
            }
          ]
        },
        {
          "id": 6,
          "title": "Git Repo Fetch Duration (Argo CD polling the gitops repo)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 14 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(argocd_git_request_duration_seconds_bucket[15m])) by (le, repo))",
              "legendFormat": "{{repo}} p95"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "s" } }
        }
      ]
    }
