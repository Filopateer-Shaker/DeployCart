# security-app.yaml
# Applies security/rbac.yaml and security/network-policy.yaml through Argo CD
# just like any other app, so they stay version-controlled and self-heal if
# someone edits them by hand on the cluster.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: <YOUR_GITOPS_REPO_URL>
    targetRevision: main
    path: security
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
