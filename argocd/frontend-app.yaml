apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: deploycart-frontend
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Filopateer-Shaker/DeployCart.git
    targetRevision: main
    path: helm/frontend
    helm:
      releaseName: frontend
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: frontend

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
